<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | PCG CG-12</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <img src="pcg_logo.png" class="logo" />
    <h1>Register for PCG CG-12</h1>
    <nav class="navbar">
      <a href="index.html">Back to Home</a>
    </nav>
  </header>

  <main>
    <section class="section auth-section">
      <form class="auth-form" action="#" method="post">
        <input type="text" name="fullname" placeholder="Full Name" required />
        <input type="email" name="email" placeholder="Email Address" required />
        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Register</button>
        <p style="margin-top:10px;">Already have an account? <a href="login.html" style="color:#f2b705;">Login here</a></p>
      </form>
    </section>
  </main>

  <footer class="footer">
    &copy; 2025 Philippine Coast Guard – CG-12
  </footer>
</body>
</html>
